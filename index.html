<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Minimalista</title>
    <link rel="stylesheet" href="style.css">
   
</head>
<body>

    <div class="calc">
        <input type="text" id="visor" readonly value="">

        <div class="grid">
            <button onclick="limpar()" style="grid-column: span 2">AC</button>
            <button onclick="apagar()">C</button>
            <button class="laranja" onclick="add('/')">/</button>

            <button onclick="add('7')">7</button>
            <button onclick="add('8')">8</button>
            <button onclick="add('9')">9</button>
            <button class="laranja" onclick="add('*')">×</button>

            <button onclick="add('4')">4</button>
            <button onclick="add('5')">5</button>
            <button onclick="add('6')">6</button>
            <button class="laranja" onclick="add('-')">-</button>

            <button onclick="add('1')">1</button>
            <button onclick="add('2')">2</button>
            <button onclick="add('3')">3</button>
            <button class="laranja" onclick="add('+')">+</button>

            <button onclick="add('0')" style="grid-column: span 2">0</button>
            <button onclick="add('.')">.</button>
            <button class="laranja" onclick="calcular()">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body> 
</html>
